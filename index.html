<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolinhas Stats Lobby 😼🌐</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin:0; background:#0a0a0a; overflow:hidden; font-family:'Courier New', monospace; cursor:crosshair; color: #0f0; }
        canvas { display: block; }
        #ui { 
            position:fixed; top:20px; left:50%; transform:translateX(-50%); 
            z-index:10; display:flex; flex-direction:column; align-items:center; gap:10px;
        }
        #stats { 
            position:fixed; top:10px; right:10px; background:rgba(0,0,0,.9); color:#0f0; 
            border:1px solid rgba(0, 255, 0, 0.5); padding:10px; font-size:11px; 
            border-radius:4px; text-transform:uppercase; box-shadow:0 0 15px rgba(0,255,0,0.2); 
            z-index:100; line-height:1.4; pointer-events:auto; min-width: 180px;
        }
        #player-list-container {
            margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;
            max-height: 200px; overflow-y: auto; scrollbar-width: thin;
        }
        .player-item { 
            padding: 5px; border: 1px transparent; cursor: pointer; 
            display: flex; justify-content: space-between; transition: 0.2s;
        }
        .player-item:hover { background: rgba(0,255,0,0.1); border-color: #0f0; }
        .player-item.me { color: #fff; font-weight: bold; cursor: default; }

        textarea#txt { 
            padding:12px 20px; font-size:16px; border-radius:15px; border:2px solid #333; 
            width:380px; height: 80px; text-align:center; background:rgba(0,0,0,0.9); color:#fff; outline:none;
            transition: border-color 0.3s; resize: none; font-family: sans-serif;
        }

        #multiplayer-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; flex-direction: column; gap: 15px; align-items: center;
            z-index: 1000; background: rgba(0,0,0,0.98); padding: 40px; border-radius: 15px;
            border: 2px solid #0f0; box-shadow: 0 0 50px rgba(0,255,0,0.3);
        }
        .mp-input { 
            width: 250px; font-size: 16px; padding: 10px; border-radius: 5px; 
            background: #111; border: 1px solid #444; color: #0f0; text-align: center; outline: none;
        }
        .btn { 
            cursor: pointer; padding: 12px 25px; background: #0f0; color: #000; 
            border: none; border-radius: 5px; font-weight: bold; font-size: 16px; width: 100%;
        }

        #remote-popup {
            position: fixed; top: 10%; left: 10%; width: 80%; height: 80%;
            background: #000; border: 2px solid #0f0; border-radius: 10px;
            z-index: 2000; display: none; flex-direction: column;
            box-shadow: 0 0 100px #000;
        }
        #popup-header { background: #0f0; color: #000; padding: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        #close-popup { cursor: pointer; background: #000; color: #fff; border: none; padding: 0 10px; }
        #remote-canvas-container { flex: 1; position: relative; overflow: hidden; background: #050505; }
        
        #chat-toggle {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: #0f0; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 300; font-size: 24px; border: none;
        }
        #chat-window {
            position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px;
            background: rgba(0, 5, 0, 0.95); border: 2px solid #0f0; border-radius: 10px;
            display: none; flex-direction: column; z-index: 299; overflow: hidden;
        }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; }
        #chat-input-area { display: flex; border-top: 1px solid #0f0; padding: 5px; }
        #chat-input { background: transparent; border: none; color: #fff; flex: 1; padding: 8px; outline: none; }
        
        .hint-text { font-size: 11px; color: #0f0; margin-top: 5px; font-weight: bold; text-shadow: 0 0 5px #000;}
    </style>
</head>
<body>

<div id="stats">
    <div style="border-bottom: 1px solid #0f0; margin-bottom: 5px; padding-bottom: 5px; font-weight: bold;">HUB PROTOCOL Z</div>
    <div>SALA: <span id="room-id-display" style="color:white;">---</span></div>
    <div>STATUS: <span id="peer-status" style="color:red">OFFLINE</span></div>
    <div id="player-list-container">
        <div style="font-size: 9px; color: #666; margin-bottom: 5px;">PLAYERS ONLINE:</div>
        <div id="players-list"></div>
    </div>
</div>

<div id="ui">
    <textarea id="txt" placeholder="Digite algo ou emojis :3" maxlength="150"></textarea>
    <div class="hint-text">Círculo de carregamento ativo (Economia de Energia) 🌀</div>
</div>

<div id="multiplayer-panel">
    <div style="color:#0f0; margin-bottom:10px; font-weight:bold;">CONFIGURAÇÃO DE ACESSO</div>
    <input type="text" id="user-nick" class="mp-input" placeholder="Seu Nick">
    <input type="text" id="target-id" class="mp-input" placeholder="ID da Sala (Opcional)">
    <button class="btn" onclick="joinLobby()">ENTRAR NO LOBBY</button>
</div>

<button id="chat-toggle">💬</button>
<div id="chat-window">
    <div style="background:#0f0; color:#000; padding:5px; font-size:10px; text-align:center; font-weight:bold;">GLOBAL CHAT</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Mensagem..." autocomplete="off">
    </div>
</div>

<div id="remote-popup">
    <div id="popup-header">
        <span id="popup-title">Tela de: USER</span>
        <button id="close-popup">X</button>
    </div>
    <div id="remote-canvas-container">
        <canvas id="remote-canvas"></canvas>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq, vol, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playExplosion() {
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1.5);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start();
}

// --- CONFIG E ESTADO ---
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const inputTxt = document.getElementById("txt");
const mpPanel = document.getElementById("multiplayer-panel");
const playersListDiv = document.getElementById("players-list");
const remotePopup = document.getElementById("remote-popup");
const remoteCanvas = document.getElementById("remote-canvas");
const remoteCtx = remoteCanvas.getContext("2d");

let peer, connections = {};
let myId = "";
let userName = "";
let isConnected = false;
let activeRemoteConn = null;

let localParticles = [];
const amount = 15000;  // pelo que pode ver nessa alteração de código inteiro aí kk, os dispositivos não irão travar mais com esse numero grande de bolinhas, pois as memas ficam em idle quando não tem texto kk    >:3
let remoteParticles = [];
let remoteInputVal = "";

let isExplodingLocal = false;
let isIdle = true; 
let frenzyTimer = 0; 
let explosionSequenceActive = false;

// --- P2P ---
function generateID() { return Math.random().toString(36).substr(2, 5).toUpperCase(); }

function joinLobby() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    userName = document.getElementById("user-nick").value.trim() || "Anon" + Math.floor(Math.random()*99);
    let roomId = document.getElementById("target-id").value.trim().toUpperCase();
    myId = roomId || generateID();
    const fullPeerId = "BALLS_ROOM_" + myId + "_" + userName.replace(/\s/g, '_');
    
    peer = new Peer(fullPeerId);
    peer.on('open', (id) => {
        document.getElementById("room-id-display").textContent = myId;
        document.getElementById("peer-status").textContent = "ONLINE";
        document.getElementById("peer-status").style.color = "#0f0";
        isConnected = true;
        mpPanel.style.display = "none";
        updatePlayerList();
    });
    peer.on('connection', setupConnection);
}

function setupConnection(conn) {
    const peerParts = conn.peer.split('_');
    const peerName = peerParts[peerParts.length - 1];
    connections[conn.peer] = { conn, name: peerName };
    conn.on('open', () => {
        updatePlayerList();
        conn.send({ type: 'handshake', name: userName });
    });
    conn.on('data', (data) => {
        if (data.type === 'chat') appendMessage(data.user, data.msg);
        if (data.type === 'handshake') {
            connections[conn.peer].name = data.name;
            updatePlayerList();
        }
        if (data.type === 'text_sync' && activeRemoteConn?.peer === conn.peer) {
            remoteInputVal = data.value;
            handleSync(remoteParticles, remoteInputVal, remoteCanvas, remoteCtx, 'remote');
        }
    });
    conn.on('close', () => {
        delete connections[conn.peer];
        updatePlayerList();
    });
}

function updatePlayerList() {
    playersListDiv.innerHTML = "";
    const me = document.createElement("div");
    me.className = "player-item me";
    me.textContent = userName + " (VOCÊ)";
    playersListDiv.appendChild(me);
    Object.keys(connections).forEach(peerId => {
        const p = document.createElement("div");
        p.className = "player-item";
        p.innerHTML = `<span>${connections[peerId].name}</span>`;
        p.onclick = () => openRemoteCanvas(peerId);
        playersListDiv.appendChild(p);
    });
}

function openRemoteCanvas(peerId) {
    activeRemoteConn = connections[peerId].conn;
    document.getElementById("popup-title").textContent = "VISUALIZANDO: " + connections[peerId].name;
    remotePopup.style.display = "flex";
    remoteParticles = [];
    for(let i=0; i<amount; i++) remoteParticles.push(new Particle(i, remoteCanvas));
    resizeRemote();
}

document.getElementById("close-popup").onclick = () => {
    remotePopup.style.display = "none";
    activeRemoteConn = null;
};

// --- CHAT ---
document.getElementById("chat-input").onkeydown = (e) => {
    if(e.key === "Enter") {
        const msg = e.target.value.trim();
        if(msg) {
            appendMessage(userName, msg);
            Object.values(connections).forEach(p => p.conn.send({ type: 'chat', user: userName, msg }));
            e.target.value = "";
        }
    }
};

function appendMessage(u, m) {
    const div = document.createElement("div");
    div.innerHTML = `<strong>${u}:</strong> ${m}`;
    const box = document.getElementById("chat-messages");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

document.getElementById("chat-toggle").onclick = () => {
    const win = document.getElementById("chat-window");
    win.style.display = win.style.display === "flex" ? "none" : "flex";
};

// --- MOTOR DE PARTÍCULAS ---
class Particle {
    constructor(i, targetCanvas) {
        this.index = i;
        this.canvasRef = targetCanvas;
        this.x = Math.random() * targetCanvas.width;
        this.y = Math.random() * targetCanvas.height;
        this.dest = { x: this.x, y: this.y };
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.r = Math.random() * 1.5 + 0.8;
        this.color = `rgba(0, 255, 0, 1)`; 
        this.originalColor = this.color;
        this.targetColor = this.color; // Cor de destino do texto/emoji
        this.colorOffset = Math.random() * 360;
        this.idleAngle = (i / amount) * Math.PI * 2; 
    }

    explode() {
        const angle = Math.random() * Math.PI * 2;
        const force = Math.random() * 60 + 20;
        this.vx = Math.cos(angle) * force;
        this.vy = Math.sin(angle) * force;
    }

    update(targetCtx, isExploding, isIdleMode) {
        let finalColor = this.targetColor;

        // Lógica de Cor
        if (frenzyTimer > 0) {
            const h = (Date.now() / 4 + this.colorOffset) % 360;
            finalColor = `hsla(${h}, 100%, 50%, 1)`;
        } else if (isIdleMode) {
            // Animação de Brilho Branco (Otimizada)
            const timePhase = (Date.now() * 0.005) % (Math.PI * 2);
            let dist = Math.abs(timePhase - this.idleAngle);
            if (dist > Math.PI) dist = Math.PI * 2 - dist;
            
            if (dist < 0.5) { 
                const brightness = 1 - (dist / 0.5);
                const val = Math.floor(brightness * 255);
                // Mescla a cor base verde com o brilho branco
                finalColor = `rgba(${val}, 255, ${val}, 1)`;
            } else {
                finalColor = this.originalColor;
            }
        }

        // Lógica de Movimento
        if (isExploding || frenzyTimer > 0) {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > this.canvasRef.width) this.vx *= -0.8;
            if (this.y < 0 || this.y > this.canvasRef.height) this.vy *= -0.8;
            this.vx *= 0.95;
            this.vy *= 0.95;
            
            if (frenzyTimer <= 0) {
                const accX = (this.dest.x - this.x) / 80;
                const accY = (this.dest.y - this.y) / 80;
                this.vx += accX;
                this.vy += accY;
            }
        } else {
            // Modo Texto ou Idle
            const easing = isIdleMode ? 30 : 15;
            const accX = (this.dest.x - this.x) / easing;
            const accY = (this.dest.y - this.y) / easing;
            this.vx = (this.vx + accX) * 0.75;
            this.vy = (this.vy + accY) * 0.75;
            this.x += this.vx;
            this.y += this.vy;
        }

        targetCtx.fillStyle = finalColor;
        targetCtx.fillRect(this.x - this.r, this.y - this.r, this.r * 2, this.r * 2);
    }
}

function triggerExplosionSequence() {
    if (explosionSequenceActive) return;
    explosionSequenceActive = true;
    let countdown = 10;
    const runTimer = () => {
        if (countdown > 0) {
            const isCritical = countdown <= 5;
            playBeep(isCritical ? 1200 : 880, 0.1, isCritical ? 0.05 : 0.1);
            countdown--;
            setTimeout(runTimer, isCritical ? 500 : 1000);
        } else {
            playExplosion();
            isExplodingLocal = true;
            frenzyTimer = 600; 
            localParticles.forEach(p => p.explode());
            explosionSequenceActive = false;
        }
    };
    runTimer();
}

function handleSync(pArray, text, tCanvas, tCtx, targetType) {
    if (!tCanvas || tCanvas.width <= 0) return;

    if (targetType === 'local' && /BOOM|KABOOM/i.test(text.trim())) {
        triggerExplosionSequence();
    }

    if (!text || text.trim() === "") {
        if (targetType === 'local') {
            isIdle = true;
            const cx = tCanvas.width / 2, cy = tCanvas.height / 2;
            const radius = Math.min(tCanvas.width, tCanvas.height) * 0.28;
            pArray.forEach((p, i) => {
                const ang = (i / pArray.length) * Math.PI * 2;
                p.idleAngle = ang;
                p.dest = { x: cx + Math.cos(ang) * radius, y: cy + Math.sin(ang) * radius };
                p.originalColor = "rgba(0, 140, 0, 0.7)";
                p.targetColor = p.originalColor;
            });
        }
        return;
    }

    if (targetType === 'local') {
        isIdle = false;
        if (!explosionSequenceActive && frenzyTimer <= 0) isExplodingLocal = false;
    }

    // Criar buffer para renderizar texto e capturar pixels/cores
    const offCanvas = document.createElement("canvas");
    offCanvas.width = tCanvas.width; 
    offCanvas.height = tCanvas.height;
    const offCtx = offCanvas.getContext("2d", { willReadFrequently: true });
    
    const lines = text.split(/\n/);
    const fs = Math.min(tCanvas.width / (Math.max(...lines.map(l => l.length)) * 0.7 + 1), (tCanvas.height / (lines.length + 1)) * 0.8, 110);
    offCtx.font = `bold ${fs}px sans-serif`;
    offCtx.fillStyle = "white"; // Cor padrão para texto
    offCtx.textAlign = "center";
    offCtx.textBaseline = "middle";

    const lh = fs * 1.2, th = lines.length * lh;
    const sy = (tCanvas.height - th) / 2 + lh / 2;
    lines.forEach((l, i) => offCtx.fillText(l.trim(), tCanvas.width/2, sy + i*lh));

    // Capturar dados de imagem (incluindo cores de emojis)
    const imgData = offCtx.getImageData(0,0,tCanvas.width, tCanvas.height).data;
    const pts = [];
    const step = 4; // Amostragem de pixels para performance
    for(let y=0; y<tCanvas.height; y+=step) {
        for(let x=0; x<tCanvas.width; x+=step) {
            const idx = (y * tCanvas.width + x) * 4;
            const alpha = imgData[idx + 3];
            if(alpha > 128) {
                pts.push({
                    x, 
                    y, 
                    color: `rgba(${imgData[idx]}, ${imgData[idx+1]}, ${imgData[idx+2]}, 1)`
                });
            }
        }
    }
    
    if(pts.length > 0) {
        pArray.forEach((p, i) => {
            const pt = pts[i % pts.length];
            p.dest = { x: pt.x, y: pt.y };
            p.targetColor = pt.color; // Sincroniza a cor da partícula com a cor capturada
        });
    }
}

inputTxt.oninput = () => {
    handleSync(localParticles, inputTxt.value, canvas, ctx, 'local');
    Object.values(connections).forEach(p => p.conn.send({ type: 'text_sync', value: inputTxt.value }));
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    handleSync(localParticles, inputTxt.value, canvas, ctx, 'local');
}

function resizeRemote() {
    const c = document.getElementById("remote-canvas-container");
    if (c && c.clientWidth > 0) {
        remoteCanvas.width = c.clientWidth;
        remoteCanvas.height = c.clientHeight;
    }
}

function loop() {
    ctx.fillStyle = "rgba(10, 10, 10, 0.3)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (frenzyTimer > 0) frenzyTimer--;
    localParticles.forEach(p => p.update(ctx, isExplodingLocal, isIdle));

    if(remotePopup.style.display === "flex" && remoteCanvas.width > 0) {
        remoteCtx.fillStyle = "rgba(5, 5, 5, 0.3)";
        remoteCtx.fillRect(0, 0, remoteCanvas.width, remoteCanvas.height);
        remoteParticles.forEach(p => p.update(remoteCtx, false, !remoteInputVal));
    }
    requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resize(); resizeRemote(); });
for(let i=0; i<amount; i++) localParticles.push(new Particle(i, canvas));
resize(); 
loop();
window.onload = () => { mpPanel.style.display = "flex"; resize(); };
</script>
</body>
</html>
