<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolinhas Stats Lobby - Photo Engine 😼🌐</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin:0; background:#0a0a0a; overflow:hidden; font-family:'Courier New', monospace; cursor:crosshair; color: #0f0; }
        canvas { display: block; }
        #ui { 
            position:fixed; top:20px; left:50%; transform:translateX(-50%); 
            z-index:10; display:flex; flex-direction:column; align-items:center; gap:10px;
            width: 90%; max-width: 600px;
        }
        #stats { 
            position:fixed; top:10px; right:10px; background:rgba(0,0,0,.9); color:#0f0; 
            border:1px solid rgba(0, 255, 0, 0.5); padding:10px; font-size:11px; 
            border-radius:4px; text-transform:uppercase; box-shadow:0 0 15px rgba(0,255,0,0.2); 
            z-index:100; line-height:1.4; pointer-events:auto; min-width: 200px;
        }
        #stats-header {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.3);
            padding-bottom: 8px;
        }
        .controls-row { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        .audio-btn {
            background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; color: #0f0;
            cursor: pointer; font-size: 8px; padding: 3px 6px; border-radius: 3px;
            text-transform: uppercase; font-weight: bold; transition: 0.2s; flex: 1; text-align: center;
        }
        .audio-btn:hover { background: #0f0; color: #000; }
        .audio-btn.muted { border-color: #555; color: #555; background: none; }
        #player-list-container {
            margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;
            max-height: 200px; overflow-y: auto; scrollbar-width: thin;
        }
        .player-item { 
            padding: 5px; border: 1px transparent; cursor: pointer; 
            display: flex; justify-content: space-between; transition: 0.2s;
        }
        .player-item:hover { background: rgba(0,255,0,0.1); border-color: #0f0; }
        .player-item.me { color: #fff; font-weight: bold; cursor: default; }
        textarea#txt { 
            padding:12px 20px; font-size:16px; border-radius:15px; border:2px solid #333; 
            width:100%; height: 60px; text-align:center; background:rgba(0,0,0,0.9); color:#fff; outline:none;
            transition: border-color 0.3s; resize: none; font-family: sans-serif;
        }
        .media-controls { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .media-btn {
            background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; color: #0f0;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 11px;
            transition: 0.2s; flex: 1; text-align: center; font-weight: bold;
        }
        .media-btn:hover { background: #0f0; color: #000; }
        input[type="file"] { display: none; }
        #multiplayer-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; flex-direction: column; gap: 15px; align-items: center;
            z-index: 1000; background: rgba(0,0,0,0.98); padding: 40px; border-radius: 15px;
            border: 2px solid #0f0; box-shadow: 0 0 50px rgba(0,255,0,0.3);
        }
        .mp-input { 
            width: 250px; font-size: 16px; padding: 10px; border-radius: 5px; 
            background: #111; border: 1px solid #444; color: #0f0; text-align: center; outline: none;
        }
        .btn { 
            cursor: pointer; padding: 12px 25px; background: #0f0; color: #000; 
            border: none; border-radius: 5px; font-weight: bold; font-size: 16px; width: 100%;
        }
        #chat-toggle {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: #0f0; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 300; font-size: 24px; border: none;
        }
        #chat-window {
            position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px;
            background: rgba(0, 5, 0, 0.95); border: 2px solid #0f0; border-radius: 10px;
            display: none; flex-direction: column; z-index: 299; overflow: hidden;
        }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; }
        #chat-input-area { display: flex; border-top: 1px solid #0f0; padding: 5px; }
        #chat-input { background: transparent; border: none; color: #fff; flex: 1; padding: 8px; outline: none; }
        .hint-text { font-size: 11px; color: #0f0; margin-top: 5px; font-weight: bold; text-shadow: 0 0 5px #000;}
    </style>
</head>
<body>

<!-- Áudio BGM -->
<audio id="bgm-player" src="BGM.mp3" loop preload="auto"></audio>

<div id="stats">
    <div id="stats-header">
        <div style="font-weight: bold; font-size: 10px; margin-bottom: 4px;">HUB PROTOCOL Z</div>
        <div class="controls-row">
            <button id="bgm-toggle" class="audio-btn" onclick="toggleBGM()">MÚSICA: ON</button>
            <button id="sfx-toggle" class="audio-btn" onclick="toggleSFX()">SOM: ON</button>
        </div>
    </div>
    <div>SALA: <span id="room-id-display" style="color:white;">---</span></div>
    <div>STATUS: <span id="peer-status" style="color:red">OFFLINE</span></div>
    <div id="player-list-container">
        <div id="players-list"></div>
    </div>
</div>

<div id="ui">
    <textarea id="txt" placeholder="Digita algo aqui..." maxlength="150"></textarea>
    <div class="media-controls">
        <label class="media-btn" for="img-upload">🖼️ CARREGAR FOTO</label>
        <input type="file" id="img-upload" accept="image/*">
        <button class="media-btn" onclick="clearMedia()">❌ LIMPAR FOTO</button>
    </div>
    <div class="hint-text" id="status-hint">Modo Económico... 🌀</div>
</div>

<div id="multiplayer-panel">
    <div style="color:#0f0; margin-bottom:10px; font-weight:bold;">ACESSO AO PROTOCOLO</div>
    <input type="text" id="user-nick" class="mp-input" placeholder="Teu Nick">
    <input type="text" id="target-id" class="mp-input" placeholder="ID da Sala">
    <button class="btn" onclick="joinLobby()">CONECTAR</button>
</div>

<button id="chat-toggle">💬</button>
<div id="chat-window">
    <div style="background:#0f0; color:#000; padding:5px; font-size:10px; text-align:center; font-weight:bold;">CHAT GLOBAL</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Mensagem..." autocomplete="off">
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
// --- MOTOR DE ÁUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bgmPlayer = document.getElementById("bgm-player");
const bgmToggleBtn = document.getElementById("bgm-toggle");
const sfxToggleBtn = document.getElementById("sfx-toggle");

let bgmMuted = localStorage.getItem("user_bgm_muted") === "true";
let sfxMuted = localStorage.getItem("user_sfx_muted") === "true";

function applyAudioStates() {
    bgmPlayer.muted = bgmMuted;
    if (bgmMuted) {
        bgmToggleBtn.textContent = "MÚSICA: OFF";
        bgmToggleBtn.classList.add("muted");
        bgmPlayer.pause();
    } else {
        bgmToggleBtn.textContent = "MÚSICA: ON";
        bgmToggleBtn.classList.remove("muted");
        if (isConnected) bgmPlayer.play().catch(() => {});
    }
    sfxToggleBtn.textContent = sfxMuted ? "SOM: OFF" : "SOM: ON";
    sfxMuted ? sfxToggleBtn.classList.add("muted") : sfxToggleBtn.classList.remove("muted");
}

function toggleBGM() { bgmMuted = !bgmMuted; localStorage.setItem("user_bgm_muted", bgmMuted); applyAudioStates(); }
function toggleSFX() { sfxMuted = !sfxMuted; localStorage.setItem("user_sfx_muted", sfxMuted); applyAudioStates(); }

function playBeep(freq, vol, duration) {
    if (sfxMuted) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// --- CORE DO SISTEMA ---
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const inputTxt = document.getElementById("txt");
const mpPanel = document.getElementById("multiplayer-panel");
const playersListDiv = document.getElementById("players-list");
const statusHint = document.getElementById("status-hint");

let peer, connections = {};
let myId = "", userName = "", isConnected = false;
let localParticles = [];
const amount = 25000; 
let isExplodingLocal = false;
let isIdle = true; 
let frenzyTimer = 0; 
let currentImg = null;

const offCanvas = document.createElement("canvas");
const offCtx = offCanvas.getContext("2d", { willReadFrequently: true });

function generateID() { return Math.random().toString(36).substr(2, 5).toUpperCase(); }

async function joinLobby() {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    if (!bgmMuted) { bgmPlayer.volume = 0.4; bgmPlayer.play().catch(() => {}); }

    userName = document.getElementById("user-nick").value.trim() || "Anon" + Math.floor(Math.random()*99);
    let roomId = document.getElementById("target-id").value.trim().toUpperCase();
    myId = roomId || generateID();
    
    peer = new Peer("BALLS_ROOM_" + myId + "_" + userName.replace(/\s/g, '_'));
    peer.on('open', () => {
        document.getElementById("room-id-display").textContent = myId;
        document.getElementById("peer-status").textContent = "ONLINE";
        document.getElementById("peer-status").style.color = "#0f0";
        isConnected = true;
        mpPanel.style.display = "none";
        updatePlayerList();
        playBeep(440, 0.1, 0.2);
    });
    peer.on('connection', setupConnection);
}

function setupConnection(conn) {
    const peerName = conn.peer.split('_').pop();
    connections[conn.peer] = { conn, name: peerName };
    conn.on('open', () => { updatePlayerList(); conn.send({ type: 'handshake', name: userName }); });
    conn.on('data', (data) => {
        if (data.type === 'chat') { appendMessage(data.user, data.msg); playBeep(880, 0.05, 0.05); }
        if (data.type === 'handshake') { connections[conn.peer].name = data.name; updatePlayerList(); }
    });
    conn.on('close', () => { delete connections[conn.peer]; updatePlayerList(); });
}

function updatePlayerList() {
    playersListDiv.innerHTML = `<div class="player-item me">${userName} (VOCÊ)</div>`;
    Object.keys(connections).forEach(id => {
        const div = document.createElement("div");
        div.className = "player-item";
        div.textContent = connections[id].name;
        playersListDiv.appendChild(div);
    });
}

function appendMessage(u, m) {
    const div = document.createElement("div");
    div.innerHTML = `<strong>${u}:</strong> ${m}`;
    const box = document.getElementById("chat-messages");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

document.getElementById("chat-toggle").onclick = () => {
    const win = document.getElementById("chat-window");
    win.style.display = win.style.display === "flex" ? "none" : "flex";
};

// --- MOTOR DE PARTÍCULAS ---
class Particle {
    constructor(i) {
        this.index = i;
        this.reset();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.dest = { x: this.x, y: this.y };
        this.vx = 0; this.vy = 0;
        this.r = Math.random() * 1.2 + 0.8;
        this.color = "rgba(0, 255, 0, 1)";
        this.targetColor = this.color;
        this.idleAngle = (this.index / amount) * Math.PI * 2;
    }
    update() {
        if (frenzyTimer > 0) {
            this.x += (Math.random() - 0.5) * 4;
            this.y += (Math.random() - 0.5) * 4;
            const h = (Date.now() / 5 + this.index) % 360;
            ctx.fillStyle = `hsla(${h}, 100%, 50%, 1)`;
        } else {
            const ease = isIdle ? 45 : 12;
            this.vx = (this.dest.x - this.x) / ease;
            this.vy = (this.dest.y - this.y) / ease;
            this.x += this.vx; this.y += this.vy;
            ctx.fillStyle = this.targetColor;
        }
        ctx.fillRect(this.x, this.y, this.r, this.r);
    }
}

function handleSync() {
    const text = inputTxt.value.trim();
    if (!text && !currentImg) {
        isIdle = true;
        statusHint.textContent = "Protocolo em Repouso... 🌀";
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const radius = Math.min(canvas.width, canvas.height) * 0.35;
        localParticles.forEach(p => {
            p.dest.x = cx + Math.cos(p.idleAngle) * radius;
            p.dest.y = cy + Math.sin(p.idleAngle) * radius;
            p.targetColor = "rgba(0, 80, 0, 0.5)";
        });
        return;
    }

    isIdle = false;
    statusHint.textContent = currentImg ? "Renderizando Visual... 🖼️" : "Processando Código... ✍️";
    
    // Configura canvas de processamento
    offCanvas.width = canvas.width;
    offCanvas.height = canvas.height;
    offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);

    if (currentImg) {
        // CORREÇÃO DE PROPORÇÃO (RESPEITA ASPECT RATIO)
        const canvasRatio = canvas.width / canvas.height;
        const imgRatio = currentImg.width / currentImg.height;
        
        let drawW, drawH;
        if (imgRatio > canvasRatio) {
            drawW = canvas.width * 0.95;
            drawH = drawW / imgRatio;
        } else {
            drawH = canvas.height * 0.85;
            drawW = drawH * imgRatio;
        }

        const startX = (canvas.width - drawW) / 2;
        const startY = (canvas.height - drawH) / 2;
        
        offCtx.drawImage(currentImg, startX, startY, drawW, drawH);
    } else {
        const lines = text.split("\n");
        const fontSize = Math.min(canvas.width / 10, canvas.height / (lines.length * 1.5), 160);
        offCtx.font = `bold ${fontSize}px sans-serif`;
        offCtx.fillStyle = "white";
        offCtx.textAlign = "center";
        offCtx.textBaseline = "middle";
        lines.forEach((l, i) => {
            const y = (canvas.height / 2) - ((lines.length - 1) * fontSize * 0.6) + (i * fontSize * 1.2);
            offCtx.fillText(l, canvas.width / 2, y);
        });
    }

    const imgData = offCtx.getImageData(0, 0, canvas.width, canvas.height).data;
    const points = [];
    const step = 2; 

    for (let y = 0; y < canvas.height; y += step) {
        for (let x = 0; x < canvas.width; x += step) {
            const i = (y * canvas.width + x) * 4;
            if (imgData[i + 3] > 128) {
                points.push({ x, y, r: imgData[i], g: imgData[i+1], b: imgData[i+2] });
            }
        }
    }

    if (points.length > 0) {
        localParticles.forEach((p, i) => {
            const pt = points[i % points.length];
            p.dest.x = pt.x;
            p.dest.y = pt.y;
            p.targetColor = `rgb(${pt.r}, ${pt.g}, ${pt.b})`;
        });
    }
}

// --- CONTROLES DE MEDIA ---
document.getElementById('img-upload').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => { currentImg = img; handleSync(); };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

function clearMedia() { 
    currentImg = null; 
    document.getElementById('img-upload').value = ""; 
    handleSync(); 
}

inputTxt.oninput = handleSync;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    handleSync();
}

function loop() {
    ctx.fillStyle = "rgba(10, 10, 10, 0.35)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (frenzyTimer > 0) frenzyTimer--;
    localParticles.forEach(p => p.update());
    requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
for(let i=0; i<amount; i++) localParticles.push(new Particle(i));

window.onload = () => { 
    applyAudioStates();
    resize();
    loop();
};
</script>
</body>
</html>
