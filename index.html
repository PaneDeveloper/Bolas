<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolinhas Stats Lobby 😼🌐</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin:0; background:#0a0a0a; overflow:hidden; font-family:'Courier New', monospace; cursor:crosshair; color: #0f0; }
        canvas { display: block; }
        #ui { 
            position:fixed; top:20px; left:50%; transform:translateX(-50%); 
            z-index:10; display:flex; flex-direction:column; align-items:center; gap:10px;
        }
        #stats { 
            position:fixed; top:10px; right:10px; background:rgba(0,0,0,.9); color:#0f0; 
            border:1px solid rgba(0, 255, 0, 0.5); padding:10px; font-size:11px; 
            border-radius:4px; text-transform:uppercase; box-shadow:0 0 15px rgba(0,255,0,0.2); 
            z-index:100; line-height:1.4; pointer-events:auto; min-width: 180px;
        }
        #player-list-container {
            margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;
            max-height: 200px; overflow-y: auto; scrollbar-width: thin;
        }
        .player-item { 
            padding: 5px; border: 1px transparent; cursor: pointer; 
            display: flex; justify-content: space-between; transition: 0.2s;
        }
        .player-item:hover { background: rgba(0,255,0,0.1); border-color: #0f0; }
        .player-item.me { color: #fff; font-weight: bold; cursor: default; }

        textarea#txt { 
            padding:12px 20px; font-size:16px; border-radius:15px; border:2px solid #333; 
            width:350px; height: 60px; text-align:center; background:rgba(0,0,0,0.9); color:#fff; outline:none;
            transition: border-color 0.3s; resize: none; font-family: sans-serif;
        }
        textarea#txt:focus { border-color: #0f0; }

        #multiplayer-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; flex-direction: column; gap: 15px; align-items: center;
            z-index: 1000; background: rgba(0,0,0,0.98); padding: 40px; border-radius: 15px;
            border: 2px solid #0f0; box-shadow: 0 0 50px rgba(0,255,0,0.3);
        }
        .mp-input { 
            width: 250px; font-size: 16px; padding: 10px; border-radius: 5px; 
            background: #111; border: 1px solid #444; color: #0f0; text-align: center; outline: none;
        }
        .btn { 
            cursor: pointer; padding: 12px 25px; background: #0f0; color: #000; 
            border: none; border-radius: 5px; font-weight: bold; font-size: 16px; width: 100%;
        }

        #remote-popup {
            position: fixed; top: 10%; left: 10%; width: 80%; height: 80%;
            background: #000; border: 2px solid #0f0; border-radius: 10px;
            z-index: 2000; display: none; flex-direction: column;
            box-shadow: 0 0 100px #000;
        }
        #popup-header { background: #0f0; color: #000; padding: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        #close-popup { cursor: pointer; background: #000; color: #fff; border: none; padding: 0 10px; }
        #remote-canvas-container { flex: 1; position: relative; overflow: hidden; background: #050505; }
        
        #chat-toggle {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: #0f0; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 300; font-size: 24px; border: none;
        }
        #chat-window {
            position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px;
            background: rgba(0, 5, 0, 0.95); border: 2px solid #0f0; border-radius: 10px;
            display: none; flex-direction: column; z-index: 299; overflow: hidden;
        }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; }
        #chat-input-area { display: flex; border-top: 1px solid #0f0; padding: 5px; }
        #chat-input { background: transparent; border: none; color: #fff; flex: 1; padding: 8px; outline: none; }
        
        .hint-text { font-size: 10px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

<div id="stats">
    <div style="border-bottom: 1px solid #0f0; margin-bottom: 5px; padding-bottom: 5px; font-weight: bold;">HUB PROTOCOL Z</div>
    <div>SALA: <span id="room-id-display" style="color:white;">---</span></div>
    <div>STATUS: <span id="peer-status" style="color:red">OFFLINE</span></div>
    <div id="player-list-container">
        <div style="font-size: 9px; color: #666; margin-bottom: 5px;">PLAYERS ONLINE (CLIQUE P/ VER):</div>
        <div id="players-list"></div>
    </div>
</div>

<div id="ui">
    <textarea id="txt" placeholder="Digite algo colorido! (ex: emojis 🚀🔥)" maxlength="150">Feito por Pane Developer❤️</textarea>
    <div class="hint-text">Shift+Enter para parágrafo</div>
</div>

<div id="multiplayer-panel">
    <div style="color:#0f0; margin-bottom:10px; font-weight:bold;">CONFIGURAÇÃO DE ACESSO</div>
    <input type="text" id="user-nick" class="mp-input" placeholder="Seu Nick">
    <input type="text" id="target-id" class="mp-input" placeholder="ID da Sala (Opcional)">
    <button class="btn" onclick="joinLobby()">ENTRAR NO LOBBY</button>
</div>

<button id="chat-toggle">💬</button>
<div id="chat-window">
    <div style="background:#0f0; color:#000; padding:5px; font-size:10px; text-align:center; font-weight:bold;">GLOBAL CHAT</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Mensagem..." autocomplete="off">
    </div>
</div>

<div id="remote-popup">
    <div id="popup-header">
        <span id="popup-title">Tela de: USER</span>
        <button id="close-popup">X</button>
    </div>
    <div id="remote-canvas-container">
        <canvas id="remote-canvas"></canvas>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
// --- CONFIG E ESTADO ---
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const inputTxt = document.getElementById("txt");
const mpPanel = document.getElementById("multiplayer-panel");
const playersListDiv = document.getElementById("players-list");
const remotePopup = document.getElementById("remote-popup");
const remoteCanvas = document.getElementById("remote-canvas");
const remoteCtx = remoteCanvas.getContext("2d");

let peer, connections = {};
let myId = "";
let userName = "";
let isConnected = false;
let activeRemoteConn = null;

let localParticles = [];
const amount = 8000; // Ajustado para performance x densidade
let remoteParticles = [];
let remoteInputVal = "";

// Estados de animação
let isExplodingLocal = false;
let isExplodingRemote = false;

// --- P2P ---
function generateID() { return Math.random().toString(36).substr(2, 5).toUpperCase(); }

function joinLobby() {
    userName = document.getElementById("user-nick").value.trim() || "Anon" + Math.floor(Math.random()*99);
    let roomId = document.getElementById("target-id").value.trim().toUpperCase();
    myId = roomId || generateID();
    const fullPeerId = "BALLS_ROOM_" + myId + "_" + userName.replace(/\s/g, '_');
    
    peer = new Peer(fullPeerId);

    peer.on('open', (id) => {
        document.getElementById("room-id-display").textContent = myId;
        document.getElementById("peer-status").textContent = "ONLINE";
        document.getElementById("peer-status").style.color = "#0f0";
        isConnected = true;
        mpPanel.style.display = "none";
        updatePlayerList();
    });

    peer.on('connection', setupConnection);
    peer.on('error', (err) => {
        if(err.type === 'unavailable-id') {
            document.getElementById("user-nick").value = userName + Math.floor(Math.random()*10);
            joinLobby();
        }
    });
}

function setupConnection(conn) {
    const peerParts = conn.peer.split('_');
    const peerName = peerParts[peerParts.length - 1];
    connections[conn.peer] = { conn, name: peerName };

    conn.on('open', () => {
        updatePlayerList();
        conn.send({ type: 'handshake', name: userName });
    });

    conn.on('data', (data) => {
        if (data.type === 'chat') appendMessage(data.user, data.msg);
        if (data.type === 'handshake') {
            connections[conn.peer].name = data.name;
            updatePlayerList();
        }
        if (data.type === 'text_sync' && activeRemoteConn?.peer === conn.peer) {
            remoteInputVal = data.value;
            handleSync(remoteParticles, remoteInputVal, remoteCanvas, remoteCtx, 'remote');
        }
    });

    conn.on('close', () => {
        delete connections[conn.peer];
        updatePlayerList();
    });
}

function updatePlayerList() {
    playersListDiv.innerHTML = "";
    const me = document.createElement("div");
    me.className = "player-item me";
    me.textContent = userName + " (VOCÊ)";
    playersListDiv.appendChild(me);

    Object.keys(connections).forEach(peerId => {
        const p = document.createElement("div");
        p.className = "player-item";
        p.innerHTML = `<span>${connections[peerId].name}</span>`;
        p.onclick = () => openRemoteCanvas(peerId);
        playersListDiv.appendChild(p);
    });
}

function openRemoteCanvas(peerId) {
    activeRemoteConn = connections[peerId].conn;
    document.getElementById("popup-title").textContent = "VISUALIZANDO: " + connections[peerId].name;
    remotePopup.style.display = "flex";
    remoteParticles = [];
    for(let i=0; i<amount; i++) remoteParticles.push(new Particle(i, remoteCanvas));
    resizeRemote();
}

document.getElementById("close-popup").onclick = () => {
    remotePopup.style.display = "none";
    activeRemoteConn = null;
};

// --- CHAT ---
document.getElementById("chat-input").onkeydown = (e) => {
    if(e.key === "Enter") {
        const msg = e.target.value.trim();
        if(msg) {
            appendMessage(userName, msg);
            Object.values(connections).forEach(p => p.conn.send({ type: 'chat', user: userName, msg }));
            e.target.value = "";
        }
    }
};

function appendMessage(u, m) {
    const div = document.createElement("div");
    div.innerHTML = `<strong>${u}:</strong> ${m}`;
    const box = document.getElementById("chat-messages");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

document.getElementById("chat-toggle").onclick = () => {
    const win = document.getElementById("chat-window");
    win.style.display = win.style.display === "flex" ? "none" : "flex";
};

// --- ENGINE ---
class Particle {
    constructor(i, targetCanvas) {
        this.canvasRef = targetCanvas;
        this.x = Math.random() * targetCanvas.width;
        this.y = Math.random() * targetCanvas.height;
        this.dest = { x: this.x, y: this.y };
        this.vx = (Math.random() - 0.5) * 20;
        this.vy = (Math.random() - 0.5) * 20;
        this.r = Math.random() * 1.5 + 0.8;
        this.color = `rgba(0, 255, 0, 1)`; // Cor inicial padrão
    }

    explode() {
        this.vx = (Math.random() - 0.5) * 40;
        this.vy = (Math.random() - 0.5) * 40;
    }

    update(targetCtx, isExploding) {
        if (isExploding) {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > this.canvasRef.width) this.vx *= -1;
            if (this.y < 0 || this.y > this.canvasRef.height) this.vy *= -1;
            this.vx *= 0.99;
            this.vy *= 0.99;
        } else {
            const accX = (this.dest.x - this.x) / 15;
            const accY = (this.dest.y - this.y) / 15;
            this.vx = (this.vx + accX) * 0.7;
            this.vy = (this.vy + accY) * 0.7;
            this.x += this.vx;
            this.y += this.vy;
        }

        targetCtx.fillStyle = this.color;
        targetCtx.beginPath();
        targetCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        targetCtx.fill();
    }
}

function handleSync(pArray, text, tCanvas, tCtx, targetType) {
    if (!text || text.trim() === "") {
        if (targetType === 'local') isExplodingLocal = true;
        else isExplodingRemote = true;
        pArray.forEach(p => p.explode());
        return;
    }

    if (targetType === 'local') isExplodingLocal = false;
    else isExplodingRemote = false;

    const offCanvas = document.createElement("canvas");
    offCanvas.width = tCanvas.width; 
    offCanvas.height = tCanvas.height;
    const offCtx = offCanvas.getContext("2d");
    
    const lines = text.split(/\n|\\n/);
    
    // USAMOS VERDE NEON COMO COR PADRÃO PARA TEXTO, 
    // MAS O CANVAS PODE PEGAR CORES DE EMOJIS!
    offCtx.fillStyle = "#00ff00"; 
    offCtx.textAlign = "center";
    offCtx.textBaseline = "middle";
    
    const fontSize = Math.min(
        tCanvas.width / (Math.max(...lines.map(l => l.length)) * 0.7 + 1), 
        (tCanvas.height / (lines.length + 1)) * 0.8,
        120
    );
    
    offCtx.font = `bold ${fontSize}px sans-serif`;
    
    const lineHeight = fontSize * 1.2;
    const totalHeight = lines.length * lineHeight;
    const startY = (tCanvas.height - totalHeight) / 2 + lineHeight / 2;

    lines.forEach((line, i) => {
        offCtx.fillText(line.trim(), tCanvas.width / 2, startY + (i * lineHeight));
    });

    const imageData = offCtx.getImageData(0,0,tCanvas.width, tCanvas.height);
    const data = imageData.data;
    const points = [];

    // Coletamos pontos e suas respectivas cores
    for(let y=0; y<tCanvas.height; y+=3) {
        for(let x=0; x<tCanvas.width; x+=3) {
            const index = (y * tCanvas.width + x) * 4;
            const alpha = data[index + 3];
            if(alpha > 128) {
                points.push({
                    x, 
                    y, 
                    color: `rgba(${data[index]}, ${data[index+1]}, ${data[index+2]}, ${alpha/255})`
                });
            }
        }
    }
    
    if(points.length > 0) {
        pArray.forEach((p, i) => {
            const targetPoint = points[i % points.length];
            p.dest = { x: targetPoint.x, y: targetPoint.y };
            p.color = targetPoint.color; // ATUALIZA A COR DA BOLINHA
        });
    }
}

inputTxt.oninput = () => {
    handleSync(localParticles, inputTxt.value, canvas, ctx, 'local');
    Object.values(connections).forEach(p => p.conn.send({ type: 'text_sync', value: inputTxt.value }));
};

inputTxt.onkeydown = (e) => {
    if(e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        inputTxt.blur();
    }
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function resizeRemote() {
    const container = document.getElementById("remote-canvas-container");
    if (container) {
        remoteCanvas.width = container.clientWidth;
        remoteCanvas.height = container.clientHeight;
    }
}

function loop() {
    ctx.fillStyle = "rgba(10, 10, 10, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    localParticles.forEach(p => p.update(ctx, isExplodingLocal));

    if(remotePopup.style.display === "flex") {
        remoteCtx.fillStyle = "rgba(5, 5, 5, 0.25)";
        remoteCtx.fillRect(0, 0, remoteCanvas.width, remoteCanvas.height);
        remoteParticles.forEach(p => p.update(remoteCtx, isExplodingRemote));
    }
    requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
    resize();
    resizeRemote();
});

resize();
for(let i=0; i<amount; i++) localParticles.push(new Particle(i, canvas));

// Inicializa com o texto padrão
handleSync(localParticles, inputTxt.value, canvas, ctx, 'local');

loop();

window.onload = () => { mpPanel.style.display = "flex"; };
</script>
</body>
</html>
