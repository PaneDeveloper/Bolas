<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII_Genv4.6_LinkSupport</title>
    <style>
        :root {
            --green: #00ff41;
            --bg: #050505;
            --accent: #008f11;
            --panel: #111;
            --danger: #ff3e3e;
            --modal-bg: rgba(0, 0, 0, 0.95);
        }

        body {
            background-color: var(--bg);
            color: var(--green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Viewport e Panes */
        .viewport {
            display: flex;
            flex: 1;
            padding: 15px;
            gap: 15px;
            overflow: hidden;
            align-items: stretch;
            justify-content: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
        }

        .pane {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border: 2px solid #222;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
            max-width: 640px;
            min-width: 300px;
        }

        .pane label {
            position: absolute;
            top: 12px; left: 12px;
            font-size: 10px;
            background: rgba(0,0,0,0.9);
            padding: 6px 12px;
            border: 1px solid var(--green);
            z-index: 100;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .media-layer {
            display: none;
            width: 100%; height: 100%;
            justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #src-layer video, #src-layer img {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .placeholder {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
        }

        canvas {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: var(--panel);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-left: 3px solid #222;
            overflow-y: auto;
            box-shadow: -15px 0 40px rgba(0,0,0,0.9);
            z-index: 200;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; text-transform: uppercase; color: #777; font-weight: 700; }
        .stat-val { color: var(--green); float: right; font-size: 11px; background: #000; padding: 1px 6px; border: 1px solid #222; }

        .btn {
            background: #1a1a1a;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            text-align: center;
        }

        .btn:hover:not(:disabled) { background: var(--green); color: #000; box-shadow: 0 0 15px var(--green); }
        .btn-start { background: #001f05; border-width: 2px; }
        .btn-rec-active { background: var(--danger) !important; color: white !important; animation: pulse 1.5s infinite; }

        input[type="text"] {
            background: #000;
            border: 1px solid #333;
            color: var(--green);
            padding: 10px;
            font-family: monospace;
            outline: none;
            font-size: 12px;
        }

        input[type="text"]:focus { border-color: var(--green); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Modal de Aviso */
        #danger-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            z-index: 1000;
            display: none;
            justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #000;
            border: 2px solid var(--danger);
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 62, 62, 0.3);
        }

        #buffer { display: none; }
    </style>
</head>
<body onclick="unlockAudio()">
    <div id="danger-modal">
        <div class="modal-content">
            <h2 style="color:var(--danger)">⚠️ ATENÇÃO!</h2>
            <p style="color:#ccc">O Modo de Renderização selecionado (<b>PARTÍCULAS</b>) poderá deixar o seu dispositivo <b>LENTO</b> e causar <b>CRASHES</b>.</p>
            <p style="color:#ccc">Processamos +20.000 itens simultâneos. Prossiga por sua conta e risco!</p>
            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 15px;">
                <label style="display:flex; align-items:center; gap:10px; color:#888;">
                    <input type="checkbox" id="no-show-again"> Não mostrar novamente
                </label>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="flex:1" onclick="cancelParticles()">CANCELAR</button>
                    <button class="btn" style="flex:1; background:var(--danger); border-color:white; color:white;" onclick="confirmParticles()">CONTINUAR</button>
                </div>
            </div>
        </div>
    </div>

    <div class="viewport">
        <div class="pane">
            <label>FONTE ORIGINAL</label>
            <div class="media-layer" id="src-layer">
                <video id="v-core" muted playsinline crossorigin="anonymous"></video>
                <img id="img-core" alt="preview" crossorigin="anonymous">
            </div>
            <div class="placeholder" id="ph-1">MÍDIA AUSENTE</div>
        </div>
        <div class="pane">
            <label>SAÍDA RENDERIZADA</label>
            <div class="media-layer" id="out-layer">
                <canvas id="canvas-core"></canvas>
            </div>
            <div class="placeholder" id="ph-2">AGUARDANDO START</div>
        </div>
    </div>

    <div class="sidebar">
        <div id="monitor">SISTEMA PRONTO</div>
        
        <div class="control-group">
            <label>Link Externo (MP4 / WebM / Direct Link)</label>
            <input type="text" id="url-input" placeholder="Cole o link do vídeo aqui...">
            <button class="btn" onclick="loadExternalUrl()" style="margin-top:5px; padding:8px;">🔗 CARREGAR LINK</button>
        </div>

        <input type="file" id="f-selector" accept="video/*,image/*,image/gif" style="display:none">
        <button class="btn" onclick="document.getElementById('f-selector').click()">📁 ARQUIVO LOCAL</button>
        
        <button class="btn btn-start" id="btn-init" disabled>▶ INICIAR ENGINE</button>
        <hr>
        
        <div class="control-group">
            <label>Modo de Renderização <span class="stat-val" id="s-style">ASCII</span></label>
            <select id="c-style" class="btn" style="padding: 5px;" onchange="checkStyleChange(this.value)">
                <option value="classic">ASCII CLÁSSICO</option>
                <option value="blocks">BLOCOS DENSOS</option>
                <option value="particles">PARTÍCULAS (CUIDADO! 🔥)</option>
            </select>
        </div>

        <div class="control-group"><label>Resolução <span class="stat-val" id="s-rs">100</span></label><input type="range" id="c-rs" min="30" max="250" value="100"></div>
        <div class="control-group"><label>Brilho <span class="stat-val" id="s-br">1.0</span></label><input type="range" id="c-br" min="0.5" max="2.5" step="0.1" value="1"></div>
        <div class="control-group"><label>Saturação <span class="stat-val" id="s-col">1.0</span></label><input type="range" id="c-col" min="0" max="1" step="0.1" value="1"></div>
        <div class="control-group"><label>Volume <span class="stat-val" id="s-vol">0.5</span></label><input type="range" id="c-vol" min="0" max="1" step="0.1" value="0.5"></div>
        <div class="control-group"><label>FPS <span class="stat-val" id="s-fps">30</span></label><input type="range" id="c-fps" min="10" max="60" value="30"></div>

        <hr>
        <button class="btn" id="btn-rec" disabled>⏺ GRAVAR (AUTO-STOP)</button>
        <button class="btn" id="btn-png">📸 CAPTURAR PNG</button>
    </div>

    <canvas id="buffer"></canvas>

<script>
/**
 * ASCII GENERATOR v4.6 - URL SUPPORT & REFINEMENTS
 */

const v = document.getElementById('v-core');
const img = document.getElementById('img-core');
const out = document.getElementById('canvas-core');
const oCtx = out.getContext('2d', { alpha: false });
const buf = document.getElementById('buffer');
const bCtx = buf.getContext('2d', { willReadFrequently: true });

const btnInit = document.getElementById('btn-init');
const btnRec = document.getElementById('btn-rec');
const monitor = document.getElementById('monitor');
const modal = document.getElementById('danger-modal');

const charMapClassic = "$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,\"^`'. ";
const charMapBlocks = "█▓▒░ ";

let lastTick = 0;
let currentMode = 'idle';
let isRunning = false;
let isRecording = false;
let recorder = null;
let chunks = [];
let audioDest = null;
let audioCtx = null;
let lastSelectedStyle = "classic";

function unlockAudio() {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

// Carregar Link Externo
function loadExternalUrl() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    isRunning = false;
    v.pause();
    resetDisplay();

    // Lógica básica para detectar tipo de arquivo pela extensão ou se é YouTube
    if (url.includes('youtube.com') || url.includes('youtu.be')) {
        monitor.innerText = "AVISO: Links do YouTube requerem Proxy CORS para renderização.";
        // Nota: O YouTube bloqueia canvas direto. Para fins educacionais, tentamos carregar como vídeo.
        // O ideal para YouTube seria usar um serviço de stream compatível ou o player IFrame.
        v.src = url; 
    } else {
        currentMode = 'video';
        v.src = url;
        v.load();
    }

    v.onloadedmetadata = () => {
        btnInit.disabled = false;
        monitor.innerText = "LINK CARREGADO";
    };
    
    v.onerror = () => {
        // Tenta como imagem se falhar como vídeo
        currentMode = 'image';
        img.src = url;
        img.onload = () => {
            btnInit.disabled = false;
            monitor.innerText = "IMAGEM EXTERNA CARREGADA";
        };
        img.onerror = () => monitor.innerText = "ERRO AO CARREGAR LINK (CORS?)";
    };
}

function resetDisplay() {
    document.querySelectorAll('.media-layer').forEach(l => {
        l.style.display = 'none';
        l.style.opacity = '0';
    });
    document.querySelectorAll('.placeholder').forEach(p => p.style.display = 'flex');
}

v.onended = () => {
    monitor.innerText = "MÍDIA FINALIZADA";
    isRunning = false;
    if (isRecording) stopRecording();
};

function checkStyleChange(val) {
    if (val === 'particles') {
        if (!localStorage.getItem('skipParticleWarning')) modal.style.display = 'flex';
    } else {
        lastSelectedStyle = val;
    }
}

function confirmParticles() {
    if (document.getElementById('no-show-again').checked) localStorage.setItem('skipParticleWarning', 'true');
    modal.style.display = 'none';
    lastSelectedStyle = 'particles';
}

function cancelParticles() {
    modal.style.display = 'none';
    document.getElementById('c-style').value = lastSelectedStyle;
    updateBadges();
}

function updateBadges() {
    document.querySelectorAll('input[type=range]').forEach(i => {
        const b = document.getElementById('s-'+i.id.split('-')[1]);
        if(b) b.innerText = i.value;
    });
    if (v && currentMode === 'video') v.volume = document.getElementById('c-vol').value;
}

document.getElementById('f-selector').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    isRunning = false;
    v.pause();
    resetDisplay();

    const url = URL.createObjectURL(file);
    if (file.type.startsWith('video')) {
        currentMode = 'video';
        v.src = url;
        v.loop = false;
        v.onloadedmetadata = () => { btnInit.disabled = false; monitor.innerText = "ARQUIVO CARREGADO"; };
    } else {
        currentMode = file.type === 'image/gif' ? 'gif' : 'image';
        img.src = url;
        img.onload = () => { btnInit.disabled = false; monitor.innerText = "IMAGEM CARREGADA"; };
    }
};

async function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(v);
        audioDest = audioCtx.createMediaStreamDestination();
        source.connect(audioCtx.destination);
        source.connect(audioDest);
    }
    if (audioCtx.state === 'suspended') await audioCtx.resume();
}

function processFrame() {
    if (!isRunning && currentMode === 'video') return;
    const source = currentMode === 'video' ? v : img;
    const res = parseInt(document.getElementById('c-rs').value);
    const colorVal = parseFloat(document.getElementById('c-col').value);
    const style = document.getElementById('c-style').value;
    
    const sw = source.videoWidth || source.naturalWidth || 100;
    const sh = source.videoHeight || source.naturalHeight || 100;
    const w = res;
    const h = Math.round(res * (sh / sw) * 0.5);

    buf.width = w; buf.height = h;
    bCtx.filter = `brightness(${document.getElementById('c-br').value}) grayscale(${1 - colorVal})`;
    try {
        bCtx.drawImage(source, 0, 0, w, h);
    } catch(e) {
        monitor.innerText = "ERRO DE RENDERIZAÇÃO (CORS)";
        isRunning = false;
        return;
    }

    const pixels = bCtx.getImageData(0, 0, w, h).data;
    const cellW = 8, cellH = 10;
    out.width = w * cellW; out.height = h * cellH;
    oCtx.fillStyle = "#000"; oCtx.fillRect(0, 0, out.width, out.height);

    if (style !== 'particles') {
        oCtx.font = `bold 10px monospace`;
        oCtx.textBaseline = "top";
        const activeMap = (style === 'blocks') ? charMapBlocks : charMapClassic;
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                const avg = (r * 0.299 + g * 0.587 + b * 0.114);
                const charIdx = Math.floor((avg / 256) * activeMap.length);
                oCtx.fillStyle = (colorVal > 0.1) ? `rgb(${r},${g},${b})` : `rgb(${avg},${avg},${avg})`;
                oCtx.fillText(activeMap[charIdx] || " ", x * cellW, y * cellH);
            }
        }
    } else {
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                const avg = (r * 0.299 + g * 0.587 + b * 0.114);
                if (avg > 20) {
                    const radius = (avg / 255) * (cellW / 2) * 1.5;
                    oCtx.beginPath();
                    oCtx.arc(x * cellW + cellW/2, y * cellH + cellH/2, radius, 0, Math.PI * 2);
                    oCtx.fillStyle = (colorVal > 0.1) ? `rgb(${r},${g},${b})` : `rgb(${avg},${avg},${avg})`;
                    oCtx.fill();
                }
            }
        }
    }
}

function mainLoop(now) {
    if (!isRunning) return;
    const interval = 1000 / parseInt(document.getElementById('c-fps').value);
    if (now - lastTick >= interval) {
        processFrame();
        lastTick = now;
    }
    requestAnimationFrame(mainLoop);
}

btnInit.onclick = async () => {
    unlockAudio();
    isRunning = true;
    document.querySelectorAll('.placeholder').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.media-layer').forEach(l => {
        l.style.display = 'flex';
        setTimeout(() => l.style.opacity = '1', 50);
    });

    if (currentMode === 'video') {
        await initAudio();
        v.muted = false;
        v.play().catch(e => monitor.innerText = "ERRO AO REPRODUZIR");
        btnRec.disabled = false;
    }
    monitor.innerText = "RENDERIZANDO...";
    requestAnimationFrame(mainLoop);
};

function stopRecording() {
    isRecording = false;
    if (recorder) recorder.stop();
    btnRec.innerText = "⏺ GRAVAR (AUTO-STOP)";
    btnRec.classList.remove('btn-rec-active');
    monitor.innerText = "DOWNLOAD INICIADO";
}

btnRec.onclick = async () => {
    if (!isRecording) {
        if (currentMode === 'video') {
            v.pause(); v.currentTime = 0;
            await new Promise(r => setTimeout(r, 100));
            v.play(); isRunning = true;
            requestAnimationFrame(mainLoop);
        }
        isRecording = true; chunks = [];
        const stream = out.captureStream(parseInt(document.getElementById('c-fps').value));
        const combined = audioDest ? new MediaStream([...stream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]) : stream;
        recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp8' });
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ASCII_STREAM_${Date.now()}.webm`;
            a.click();
        };
        recorder.start();
        btnRec.innerText = "⏹ PARAR GRAVAÇÃO";
        btnRec.classList.add('btn-rec-active');
        monitor.innerText = "GRAVANDO STREAM...";
    } else {
        stopRecording();
    }
};

document.getElementById('btn-png').onclick = () => {
    const link = document.createElement('a');
    link.download = `ASCII_SNAP_${Date.now()}.png`;
    link.href = out.toDataURL('image/png');
    link.click();
};

document.querySelectorAll('input, select').forEach(el => {
    el.oninput = () => {
        updateBadges();
        if (currentMode !== 'video' && isRunning) processFrame();
    };
});

updateBadges();
</script>
</body>
</html>
